<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Triton Ascend Documentation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #2980b9, #6dd5fa);
      color: #fff;
    }
    .card {
      background: rgba(255, 255, 255, .12);
      backdrop-filter: blur(8px);
      border-radius: 12px;
      padding: 2.5rem 3rem;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .15);
    }
    h1 { margin: 0 0 .5rem; font-size: 1.8rem; }
    p { margin: 0 0 1.5rem; opacity: .9; }
    .links { display: flex; gap: 1rem; justify-content: center; }
    .links a {
      display: inline-block;
      padding: .65rem 1.4rem;
      border-radius: 6px;
      background: #fff;
      color: #2980b9;
      text-decoration: none;
      font-weight: 600;
      transition: transform .15s ease, box-shadow .15s ease;
    }
    .links a:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(0, 0, 0, .2);
    }
  </style>
  <script>
    // Auto-redirect based on browser locale; ?nopick=1 disables auto-redirect.
    (function () {
      if (window.location.search.indexOf('nopick') !== -1) return;
      var lang = (navigator.language || 'en').toLowerCase();
      var target = lang.indexOf('zh') === 0 ? 'zh' : 'en';
      window.location.replace('./' + target + '/index.html');
    })();
  </script>
</head>
<body>
  <div class="card">
    <h1>Triton Ascend</h1>
    <p>Choose your language / 选择文档语言</p>
    <div class="links">
      <a href="./zh/index.html">中文</a>
      <a href="./en/index.html">English</a>
    </div>
  </div>
</body>
</html>
