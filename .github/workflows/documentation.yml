name: Documentation

# Workflow 1 of the docs pipeline.
#
# Responsibility: build the sphinx site for both languages and stash the result
# (HTML + a small metadata folder) as a GitHub Actions artifact. That artifact
# is consumed by the companion "Documentation" workflow, which runs in the
# upstream context and has the OBS credentials needed to publish.
#
# Why split: secrets like OBS_AK/OBS_SK are not available to fork PRs. Keeping
# this workflow strictly read-only means fork PRs can build and validate docs
# without touching any credentials or external storage.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: [release/3.2.1, main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs-preview.yml'
      - '.github/workflows/documentation.yml'
  pull_request:
    types: [opened, reopened, synchronize, closed]
    paths:
      - 'docs/**'
      - '.github/workflows/docs-preview.yml'
      - '.github/workflows/documentation.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compute version slug
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            REF="${{ github.base_ref }}"
          else
            REF="${{ github.ref_name }}"
          fi
          SLUG="${REF//\//-}"
          echo "slug=${SLUG}" >> "$GITHUB_OUTPUT"
          echo "Version slug: ${SLUG}"

      - name: Install dependent packages
        if: github.event.action != 'closed'
        run: python3 -m pip install -r docs/zh/requirement.txt

      - name: Build zh docs
        if: github.event.action != 'closed'
        run: python3 -m sphinx docs/zh "_site/${{ steps.ver.outputs.slug }}/zh"

      - name: Build en docs
        if: github.event.action != 'closed'
        run: python3 -m sphinx docs/en "_site/${{ steps.ver.outputs.slug }}/en"

      - name: Add landing page
        if: github.event.action != 'closed'
        run: cp docs/landing.html _site/index.html

      - name: Stash deploy metadata
        run: |
          mkdir -p _meta
          echo "${{ github.event_name }}"        > _meta/event
          echo "${{ steps.ver.outputs.slug }}"   > _meta/slug
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "${{ github.event.pull_request.number }}"   > _meta/pr_number
            echo "${{ github.event.action }}"                > _meta/pr_action
            echo "${{ github.event.pull_request.head.sha }}" > _meta/sha
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: docs-artifact
          path: |
            _site
            _meta
          if-no-files-found: warn
          retention-days: 7