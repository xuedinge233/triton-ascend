name: PR Wheels OBS Lifecycle

# Manages the OBS pr_<N>/ directory in the base-repo context so it works for
# fork PRs (which can't read secrets via pull_request triggers).
#
#   publish: after Wheels finishes, download the wheel artifact and upload
#            it to obs://.../triton-ascend-pr/pr_<N>/
#   cleanup: when the PR closes, remove that same directory
on:
  workflow_run:
    workflows: ["Wheels"]
    types: [completed]
  pull_request_target:
    types: [closed]

jobs:
  publish:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      pull-requests: read
    steps:
      # Sparse checkout: we only need .github/actions/setup-obsutil for the
      # composite action; skip pulling the full source tree.
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions/setup-obsutil

      - name: Resolve PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          # workflow_run.pull_requests is empty for fork PRs, so look up the
          # PR by head SHA via the API instead.
          NUM=$(gh api "/repos/${{ github.repository }}/commits/${SHA}/pulls" \
                  --jq 'if length > 0 then .[0].number else empty end')
          if [ -z "${NUM}" ]; then
            echo "No PR found for SHA ${SHA}; nothing to publish."
            exit 0
          fi
          echo "num=${NUM}" >> "$GITHUB_OUTPUT"

      - name: Download wheel artifact
        if: steps.pr.outputs.num != ''
        uses: actions/download-artifact@v4
        with:
          pattern: cibw-wheels-*
          path: wheelhouse
          merge-multiple: true
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup obsutil
        if: steps.pr.outputs.num != ''
        uses: ./.github/actions/setup-obsutil
        with:
          ak: ${{ secrets.OBS_AK }}
          sk: ${{ secrets.OBS_SK }}

      - name: Upload to OBS
        if: steps.pr.outputs.num != ''
        env:
          PR_NUM: ${{ steps.pr.outputs.num }}
        run: |
          DEST="obs://triton-ascend-artifacts/triton-ascend-pr/pr_${PR_NUM}/"
          # Manifest so consumers (e.g. the yellow pipeline) can resolve the
          # wheel filename without listing the bucket.
          basename wheelhouse/*.whl > wheelhouse/wheel-name.txt
          obsutil/obsutil cp -u wheelhouse/wheel-name.txt "$DEST"
          obsutil/obsutil cp -u wheelhouse/*.whl "$DEST"

  cleanup:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    # pull_request_target runs in base-repo context, so secrets are available
    # even for fork PRs. The default checkout ref under this trigger is the
    # base branch (never PR head), so we can safely load the local composite
    # action without executing fork-supplied code.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions/setup-obsutil

      - uses: ./.github/actions/setup-obsutil
        with:
          ak: ${{ secrets.OBS_AK }}
          sk: ${{ secrets.OBS_SK }}

      - name: Remove PR wheels from OBS
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
        run: obsutil/obsutil rm -r -f "obs://triton-ascend-artifacts/triton-ascend-pr/pr_${PR_NUM}/" || true
