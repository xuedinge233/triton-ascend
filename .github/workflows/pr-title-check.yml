name: PR Title Check

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  check-pr-title:
    name: Check PR title format
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          MAX_LEN: 72
        run: |
          echo "PR title: $PR_TITLE"

          # Length check
          TITLE_LEN=${#PR_TITLE}
          if [ "$TITLE_LEN" -gt "$MAX_LEN" ]; then
            echo "::error::PR title is $TITLE_LEN chars, exceeds max length $MAX_LEN."
            exit 1
          fi

          # Format check: [type](scope): subject  — scope is optional
          # Allowed types: feat | fix | docs | style | refactor | test | chore | revert
          PATTERN='^\[(feat|fix|docs|style|refactor|test|chore|revert)\](\([^)]+\))?: .+$'
          if ! echo "$PR_TITLE" | grep -qE "$PATTERN"; then
            echo "::error::PR title does not match the required format."
            echo "Format:   [<type>](<scope>): <subject>"
            echo "Example:  [feat](user): add login support"
            echo "Types:    feat | fix | docs | style | refactor | test | chore | revert"
            echo "Max len:  $MAX_LEN chars"
            exit 1
          fi

          echo "PR title complies with the specifications."
