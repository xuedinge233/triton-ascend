name: Slash Command

# PR-comment ChatOps. Recognised commands (must appear on the first line):
#   /rebuild              re-run Ascend950 Wheels Build (kicks off the whole
#                         pipeline; downstream Pipeline Tests cascades via
#                         workflow_run)
#   /retry                for every PR-pipeline workflow on this branch whose
#                         latest run is currently failed/cancelled/timed_out,
#                         rerun the failed jobs of that run. Multiple workflows
#                         can be retried in one go.
#   /retry <job-name>     in each picked run, rerun any job whose name matches
#                         <job-name> exactly. Matches across multiple runs are
#                         all retried.
#
# Runs in base-repo context (issue_comment), so secrets are available even for
# fork PRs. We never check out PR head — only GitHub API calls.

on:
  issue_comment:
    types: [created]

permissions: {}

jobs:
  dispatch:
    if: >-
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, '/')
    runs-on: ubuntu-latest
    permissions:
      actions: write          # rerun runs / jobs
      pull-requests: read     # read PR head ref
      issues: write           # post reactions on the comment
    steps:
      - name: Parse command
        id: cmd
        env:
          BODY: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail
          # Only the first line is treated as the command; the rest is ignored.
          FIRST=$(printf '%s' "$BODY" | head -n1 | tr -d '\r')
          NAME=$(printf '%s' "$FIRST" | awk '{print $1}')
          ARG=$(printf  '%s' "$FIRST" | awk '{$1=""; sub(/^ /, ""); print}')
          case "$NAME" in
            /rebuild|/retry) match=true  ;;
            *)               match=false ;;
          esac
          echo "name=$NAME"   >> "$GITHUB_OUTPUT"
          echo "arg=$ARG"     >> "$GITHUB_OUTPUT"
          echo "match=$match" >> "$GITHUB_OUTPUT"

      - name: Stop if not a recognised command
        if: steps.cmd.outputs.match != 'true'
        run: echo "Not a recognised slash command; exiting." && exit 0

      - name: Check author permission
        id: perm
        if: steps.cmd.outputs.match == 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
          ACTOR:    ${{ github.event.comment.user.login }}
        run: |
          set -euo pipefail
          LEVEL=$(gh api "repos/${{ github.repository }}/collaborators/${ACTOR}/permission" \
                    --jq .permission 2>/dev/null || echo none)
          echo "level=$LEVEL" >> "$GITHUB_OUTPUT"
          case "$LEVEL" in
            admin|write|maintain) echo "ok=true"  >> "$GITHUB_OUTPUT" ;;
            *)                    echo "ok=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: React 👎 and stop (no permission)
        if: steps.cmd.outputs.match == 'true' && steps.perm.outputs.ok != 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          gh api -X POST \
            "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content=-1
          exit 1

      - name: React 👀 (acknowledged)
        if: steps.cmd.outputs.match == 'true' && steps.perm.outputs.ok == 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          gh api -X POST \
            "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content=eyes

      - name: Resolve PR head branch
        id: pr
        if: steps.cmd.outputs.ok != 'false' && steps.perm.outputs.ok == 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
          PR:       ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          # head_branch on a run is the branch name (not owner-prefixed), which
          # is what the Actions API expects for filtering.
          BR=$(gh pr view "$PR" --repo "${{ github.repository }}" \
                 --json headRefName --jq .headRefName)
          echo "branch=$BR" >> "$GITHUB_OUTPUT"

      # ---------- /rebuild: rerun Wheels Build from scratch ----------
      - name: Find latest Wheels Build run
        id: wb
        if: steps.cmd.outputs.name == '/rebuild' && steps.perm.outputs.ok == 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
          BR:       ${{ steps.pr.outputs.branch }}
        run: |
          set -euo pipefail
          RUN_ID=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/Ascend950-wheels-build.yml/runs?branch=${BR}&per_page=1" \
            --jq '.workflow_runs[0].id // empty')
          if [ -z "$RUN_ID" ]; then
            echo "No Wheels Build run found for branch ${BR}." >&2
            exit 1
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Rerun Wheels Build
        if: steps.cmd.outputs.name == '/rebuild' && steps.perm.outputs.ok == 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          gh api -X POST \
            "repos/${{ github.repository }}/actions/runs/${{ steps.wb.outputs.run_id }}/rerun"

      # ---------- /retry: rerun failed (or one specific) job of latest run(s) ----------
      # For each PR-pipeline workflow on this branch, look at its LATEST run;
      # include it for retry only if that latest is failed/cancelled/timed_out.
      # Stale failures already superseded by a successful run are ignored.
      #
      # workflow_run-triggered runs (e.g. Pipeline Tests after Wheels Build)
      # cannot be reliably retried via rerun-failed-jobs (GitHub reuses the
      # original workflow_run event payload and may 403). Instead, we full-rerun
      # the *upstream* (matched by head_sha + workflow name) so the cascade
      # refires cleanly.
      #
      # Add to CASCADE_MAP below when you wire up a new workflow_run cascade.
      # Without an explicit mapping, we fall back to "any non-workflow_run run
      # with the same head_sha".
      - name: Find all currently-failed PR runs on this branch
        id: latest
        if: steps.cmd.outputs.name == '/retry' && steps.perm.outputs.ok == 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
          BR:       ${{ steps.pr.outputs.branch }}
        run: |
          set -euo pipefail

          CASCADE_MAP='{
            "Ascend950 Pipeline Tests": "Ascend950 Wheels Build"
          }'

          ALL=$(gh api \
            "repos/${{ github.repository }}/actions/runs?branch=${BR}&per_page=100" \
            --jq '[.workflow_runs[]
                    | select(.event=="pull_request" or .event=="workflow_run")
                    | {id, name, conclusion, event, head_sha, workflow_id, created_at}]')

          PICKS=$(echo "$ALL" | jq '
              group_by(.workflow_id)
              | map(sort_by(.created_at) | reverse | .[0]
                    | select(.conclusion=="failure"
                          or .conclusion=="cancelled"
                          or .conclusion=="timed_out"))
              | sort_by(.id) | reverse')

          if [ "$(echo "$PICKS" | jq 'length')" = "0" ]; then
            echo "No currently-failed PR run found for branch ${BR}." >&2
            echo "If you want to rebuild a successful run from scratch, comment /rebuild instead." >&2
            exit 1
          fi

          echo "Picked failed runs:"
          echo "$PICKS" | jq -r '.[] | "  - \(.name) (run_id=\(.id), event=\(.event), conclusion=\(.conclusion))"'

          # Classify each pick. workflow_run-triggered failures redirect to
          # restarting their upstream (full rerun, cascade refires). Everything
          # else gets a direct rerun-failed-jobs. If a pick's id is also someone
          # else's upstream, the upstream restart supersedes the direct rerun.
          PLAN=$(jq -n \
            --argjson all   "$ALL" \
            --argjson picks "$PICKS" \
            --argjson cas   "$CASCADE_MAP" '
              $picks | map(
                if .event != "workflow_run" then
                  {kind:"direct", run_id:.id, name:.name}
                else
                  ($cas[.name] // "") as $up_name
                  | .head_sha as $sha
                  | (if $up_name == "" then
                       $all | map(select(.head_sha==$sha and .event!="workflow_run"))
                     else
                       $all | map(select(.head_sha==$sha and .name==$up_name))
                     end
                     | sort_by(.created_at) | reverse | .[0]) as $up
                  | if $up then
                      {kind:"upstream", run_id:$up.id, via:.name, original_run_id:.id}
                    else
                      {kind:"direct_fallback", run_id:.id, name:.name}
                    end
                end
              )')

          echo "Classification:"
          echo "$PLAN" | jq -r '.[] |
            if .kind == "upstream" then
              "  > \(.via) (run=\(.original_run_id)): restart upstream run=\(.run_id)"
            elif .kind == "direct_fallback" then
              "  ! \(.name) (run=\(.run_id)): workflow_run with no upstream; falling back to direct"
            else
              "  - \(.name) (run=\(.run_id)): direct rerun-failed-jobs"
            end'

          DIRECT_IDS=$(echo "$PLAN"   | jq -c '[.[] | select(.kind=="direct" or .kind=="direct_fallback") | .run_id]')
          UPSTREAM_IDS=$(echo "$PLAN" | jq -c '[.[] | select(.kind=="upstream") | .run_id] | unique')
          # Upstream full rerun covers any direct id that is the same run.
          DIRECT_IDS=$(jq -nc --argjson d "$DIRECT_IDS" --argjson u "$UPSTREAM_IDS" '$d - $u')

          echo
          echo "Plan: direct_ids=${DIRECT_IDS}  upstream_ids=${UPSTREAM_IDS}"

          echo "direct_ids=${DIRECT_IDS}"     >> "$GITHUB_OUTPUT"
          echo "upstream_ids=${UPSTREAM_IDS}" >> "$GITHUB_OUTPUT"
          echo "picks=$(echo "$PICKS" | jq -c '.')" >> "$GITHUB_OUTPUT"

      - name: Rerun failed jobs / restart upstream (no arg)
        if: >-
          steps.cmd.outputs.name == '/retry' &&
          steps.perm.outputs.ok == 'true' &&
          steps.cmd.outputs.arg == ''
        env:
          GH_TOKEN:     ${{ secrets.BOT_TOKEN }}
          DIRECT_IDS:   ${{ steps.latest.outputs.direct_ids }}
          UPSTREAM_IDS: ${{ steps.latest.outputs.upstream_ids }}
        run: |
          set -euo pipefail
          fail=0

          # 1) rerun-failed-jobs on direct targets (PR-triggered failures).
          while read -r RUN_ID; do
            [ -n "$RUN_ID" ] || continue
            echo "::group::rerun-failed-jobs run_id=${RUN_ID}"
            if ! gh api -X POST \
                "repos/${{ github.repository }}/actions/runs/${RUN_ID}/rerun-failed-jobs"; then
              echo "Failed to rerun run ${RUN_ID}" >&2
              fail=1
            fi
            echo "::endgroup::"
          done < <(echo "$DIRECT_IDS" | jq -r '.[]')

          # 2) Full rerun upstreams whose workflow_run downstream failed.
          while read -r RUN_ID; do
            [ -n "$RUN_ID" ] || continue
            echo "::group::full rerun (cascade) run_id=${RUN_ID}"
            if ! gh api -X POST \
                "repos/${{ github.repository }}/actions/runs/${RUN_ID}/rerun"; then
              echo "Failed to full-rerun upstream ${RUN_ID}" >&2
              fail=1
            fi
            echo "::endgroup::"
          done < <(echo "$UPSTREAM_IDS" | jq -r '.[]')

          exit $fail

      - name: Rerun one named job across picked runs
        if: >-
          steps.cmd.outputs.name == '/retry' &&
          steps.perm.outputs.ok == 'true' &&
          steps.cmd.outputs.arg != ''
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
          PICKS:    ${{ steps.latest.outputs.picks }}
          JOB_NAME: ${{ steps.cmd.outputs.arg }}
        run: |
          set -euo pipefail
          # Scan every picked run for a job matching ${JOB_NAME} exactly, then
          # rerun each match. The single-job rerun endpoint is reliable on both
          # PR-triggered and workflow_run-triggered runs.
          matched=0
          fail=0
          while read -r RUN_ID; do
            [ -n "$RUN_ID" ] || continue
            JOB_ID=$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}/jobs?per_page=100" \
                      --jq ".jobs[] | select(.name==\"${JOB_NAME}\") | .id" | head -n1)
            [ -n "$JOB_ID" ] || continue
            echo "::group::rerun job '${JOB_NAME}' (job_id=${JOB_ID}) in run ${RUN_ID}"
            if ! gh api -X POST \
                "repos/${{ github.repository }}/actions/jobs/${JOB_ID}/rerun"; then
              echo "Failed to rerun job ${JOB_ID}" >&2
              fail=1
            fi
            echo "::endgroup::"
            matched=$((matched+1))
          done < <(echo "$PICKS" | jq -r '.[].id')
          if [ "$matched" -eq 0 ]; then
            echo "No job named '${JOB_NAME}' found in any currently-failed run." >&2
            exit 1
          fi
          echo "Retried ${matched} job(s) named '${JOB_NAME}'."
          exit $fail

      - name: React 🚀 (dispatched)
        if: success() && steps.perm.outputs.ok == 'true' && steps.cmd.outputs.match == 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          gh api -X POST \
            "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content=rocket

      - name: React 😕 (failed to dispatch)
        if: failure() && steps.perm.outputs.ok == 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          gh api -X POST \
            "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content=confused
