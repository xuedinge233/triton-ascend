name: A5 Wheels Build

on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'LICENSE'
      - 'MANIFEST.in'
      - '.gitignore'
      - '.github/CODEOWNERS'
      - '.github/dependabot.yml'
      - 'cmake/llvm-hash.txt'
      - 'third_party/ascend/llvm_patch/**'
      - 'docker/**'
      - 'requirements.txt'
      - 'requirements_dev.txt'
      - '.github/workflows/build-docker-image.yml'
      - '.github/workflows/create_release.yml'
      - '.github/workflows/documentation.yml'
      - '.github/workflows/llvm-build.yml'
      - '.github/workflows/llvm-build/**'
      - '.github/workflows/pre-commit.yml'
      - '.github/workflows/runner-preparation.yml'

concurrency:
  group: wheels-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  Build-Wheels:
    timeout-minutes: 360
    runs-on: ${{ matrix.config.runs_on }}

    strategy:
      fail-fast: false
      matrix:
        config:
          - {runs_on: linux-amd64-cpu-16, arch: x86_64}
        python: [cp311]

    permissions:
      id-token: write
      contents: read

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build and install triton-ascend
        shell: bash
        env:
          TRITON_BUILD_WITH_CCACHE: "true"
          TRITON_BUILD_WITH_CLANG_LLD: "TRUE"
          TRITON_DISABLE_LINE_INFO: 1
          CCACHE_COMPRESS: "true"
          TRITON_BUILD_WITH_O1: true
          TRITON_BUILD_PROTON: OFF
          TRITON_WHEEL_NAME: triton-ascend
          TRITON_APPEND_CMAKE_ARGS: "-DTRITON_BUILD_UT=ON"
        run: |
          ccache --zero-stats
          NUM_PROCS=$(( $(nproc) / 3 ))
          if [ "$NUM_PROCS" -lt 1 ]; then NUM_PROCS=1; fi
          MAX_JOBS="$NUM_PROCS" \
          ${PYTHON} setup.py bdist_wheel --dist-dir wheelhouse/

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-manylinux_2_28_${{ matrix.config.arch }}-wheels-upload
          path: ./wheelhouse/*.whl
