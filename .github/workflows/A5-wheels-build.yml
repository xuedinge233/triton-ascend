name: A5 Wheels Build

on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'LICENSE'
      - 'MANIFEST.in'
      - '.gitignore'
      - '.github/CODEOWNERS'
      - '.github/dependabot.yml'
      - 'cmake/llvm-hash.txt'
      - 'third_party/ascend/llvm_patch/**'
      - 'docker/**'
      - 'requirements.txt'
      - 'requirements_dev.txt'
      - '.github/workflows/build-docker-image.yml'
      - '.github/workflows/create_release.yml'
      - '.github/workflows/documentation.yml'
      - '.github/workflows/llvm-build.yml'
      - '.github/workflows/llvm-build/**'
      - '.github/workflows/pre-commit.yml'
      - '.github/workflows/runner-preparation.yml'

concurrency:
  group: wheels-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  Build-Wheels:
    timeout-minutes: 360
    runs-on: ${{ matrix.config.runs_on }}

    strategy:
      fail-fast: false
      matrix:
        config:
          - {runs_on: linux-amd64-cpu-16, arch: x86_64}
        python: [cp311]

    permissions:
      id-token: write
      contents: read

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Probe pre-existing Python
        shell: bash
        run: |
          # Self-hosted runner state probe — never fail the build on this.
          set +e
          echo "python:     $(command -v python || echo MISSING)"
          echo "python3:    $(command -v python3 || echo MISSING)"
          echo "python3.11: $(command -v python3.11 || echo MISSING)"
          (python3 --version 2>&1 || true)

      - name: Install Python 3.11 via uv
        shell: bash
        run: |
          set -euo pipefail
          # uv 自身是单二进制,Python 用预编译版(python-build-standalone)。
          # self-hosted runner 文件系统跨 job 持久,装一次后后续 job 直接走缓存。

          if ! command -v uv >/dev/null 2>&1; then
            curl -LsSf https://astral.sh/uv/install.sh | sh
          fi
          # uv 官方 installer 默认装到 ~/.local/bin;旧版本可能放 ~/.cargo/bin
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

          uv python install 3.11

          # uv-managed Python 自带 PEP 668 的 EXTERNALLY-MANAGED 标记,直接
          # 在全局 pip install 会报 externally-managed-environment。做法是
          # 用 uv 在 workspace 下建个 venv,所有 pip / setup.py 都跑在 venv 里。
          rm -rf .venv
          # --seed 让 venv 里自带 pip/setuptools/wheel,setup.py 走 setuptools
          # 内部调 pip 时不会因 "No module named pip" 失败。
          uv venv --python 3.11 --seed .venv

          PYBIN="$PWD/.venv/bin/python"
          echo "PYTHON=$PYBIN" >> "$GITHUB_ENV"
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          "$PYBIN" --version

      - name: Ensure build tools (ccache / clang / lld)
        shell: bash
        run: |
          set -e
          # A5 path builds on the bare runner (not in a manylinux container
          # like wheels.yml), so clang+lld+ccache that CIBW_BEFORE_ALL installs
          # inside the container must instead live on the runner itself.
          # Long-term: bake these into the runner image and drop this step.
          MISSING=()
          for t in ccache clang lld; do
            command -v "$t" >/dev/null 2>&1 || MISSING+=("$t")
          done
          if [ ${#MISSING[@]} -eq 0 ]; then
            echo "All build tools present."
            exit 0
          fi
          echo "Installing: ${MISSING[*]}"
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y "${MISSING[@]}"
          elif command -v dnf >/dev/null 2>&1; then
            sudo dnf install -y "${MISSING[@]}"
          elif command -v yum >/dev/null 2>&1; then
            sudo yum install -y "${MISSING[@]}"
          else
            echo "No supported package manager on this runner" >&2
            exit 1
          fi
          for t in "${MISSING[@]}"; do
            command -v "$t" >/dev/null 2>&1 \
              || { echo "Install of $t failed" >&2; exit 1; }
          done

      - name: Build and install triton-ascend
        shell: bash
        env:
          TRITON_BUILD_WITH_CCACHE: "true"
          TRITON_BUILD_WITH_CLANG_LLD: "TRUE"
          TRITON_DISABLE_LINE_INFO: 1
          CCACHE_COMPRESS: "true"
          TRITON_BUILD_WITH_O1: true
          TRITON_BUILD_PROTON: OFF
          TRITON_WHEEL_NAME: triton-ascend
          TRITON_APPEND_CMAKE_ARGS: "-DTRITON_BUILD_UT=ON"
        run: |
          # python-build-standalone 自带 pip + setuptools,但 wheel 包不一定有,
          # 而 bdist_wheel 命令依赖它,显式装一下避免首次构建报错。
          "$PYTHON" -m pip install --upgrade pip setuptools wheel

          ccache --zero-stats
          NUM_PROCS=$(( $(nproc) / 3 ))
          if [ "$NUM_PROCS" -lt 1 ]; then NUM_PROCS=1; fi
          MAX_JOBS="$NUM_PROCS" \
          "$PYTHON" setup.py bdist_wheel --dist-dir wheelhouse/

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-manylinux_2_28_${{ matrix.config.arch }}-wheels-upload
          path: ./wheelhouse/*.whl
