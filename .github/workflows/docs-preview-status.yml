name: Docs preview status

# Mirrors the RTD PR build state onto a GitHub commit status, so contributors
# see the docs preview link in the PR checks list without needing the RTD
# GitHub App installed.
#
# Requires repo secret: RTD_TOKEN (RTD account -> API tokens).
#
# Runs via pull_request_target so secrets are available and statuses can be
# written. We never check out PR code — only read PR metadata and query the
# RTD API — so this is safe for fork PRs.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  statuses: write
  pull-requests: read

concurrency:
  group: docs-preview-status-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  poll:
    runs-on: ubuntu-latest
    env:
      RTD_PROJECT: triton-ascend-docs-cn
      MAX_WAIT_MIN: '20'
      POLL_INTERVAL_SEC: '30'
    steps:
      - uses: actions/github-script@v7
        env:
          RTD_TOKEN: ${{ secrets.RTD_TOKEN }}
        with:
          script: |
            const project    = process.env.RTD_PROJECT;
            const token      = process.env.RTD_TOKEN;
            const maxWaitMin = parseInt(process.env.MAX_WAIT_MIN, 10);
            const pollSec    = parseInt(process.env.POLL_INTERVAL_SEC, 10);

            const pr  = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha;
            const ctx = 'docs/readthedocs';
            // Best-effort default; replaced with the canonical urls.documentation
            // once the RTD version exists. External (PR) preview domains live
            // under <slug>--<pr>.org.readthedocs.build for community RTD.
            let previewUrl = `https://${project}--${pr}.org.readthedocs.build/`;

            async function setStatus(state, description) {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                sha,
                state,
                target_url: previewUrl,
                description: description.slice(0, 140),
                context: ctx,
              });
            }

            // Initial pending state so the check shows up immediately.
            await setStatus('pending', 'Waiting for Read the Docs build...');

            if (!token) {
              await setStatus('error', 'RTD_TOKEN secret not configured');
              core.setFailed('RTD_TOKEN secret is not set on this repo.');
              return;
            }

            const authHeaders = { headers: { Authorization: `Token ${token}` } };
            const versionUrl = `https://app.readthedocs.org/api/v3/projects/${project}/versions/${pr}/`;
            const buildsUrl  = `https://app.readthedocs.org/api/v3/projects/${project}/versions/${pr}/builds/`;
            const deadline = Date.now() + maxWaitMin * 60 * 1000;
            const sleep = ms => new Promise(r => setTimeout(r, ms));

            let lastReportedState = 'pending';

            while (Date.now() < deadline) {
              // 1) Version detail — confirms the PR version exists and gives the
              //    canonical preview URL. The version object carries NO build
              //    info, so build state must come from the builds endpoint below.
              let version;
              try {
                const resp = await fetch(versionUrl, authHeaders);
                if (resp.status === 404) {
                  // RTD hasn't received the PR webhook yet — keep waiting.
                  await sleep(pollSec * 1000);
                  continue;
                }
                if (!resp.ok) {
                  core.warning(`RTD API ${resp.status}: ${await resp.text()}`);
                  await sleep(pollSec * 1000);
                  continue;
                }
                version = await resp.json();
              } catch (e) {
                core.info(`Fetch failed: ${e.message}; retrying.`);
                await sleep(pollSec * 1000);
                continue;
              }

              if (version.urls && version.urls.documentation) {
                previewUrl = version.urls.documentation;
              }

              // 2) Latest build for this version. The build's state is a nested
              //    object: {"code": "finished", "name": "Finished"}.
              let build = {};
              try {
                const bResp = await fetch(buildsUrl, authHeaders);
                if (bResp.ok) {
                  const bData = await bResp.json();
                  build = (bData.results || [])[0] || {};
                }
              } catch (e) {
                core.info(`Builds fetch failed: ${e.message}; retrying.`);
              }

              const state = (build.state && build.state.code) || 'unknown';

              if (state === 'finished') {
                if (build.success) {
                  await setStatus('success', 'Preview built successfully');
                } else {
                  await setStatus('failure', 'Read the Docs build failed');
                }
                return;
              }

              if (state !== lastReportedState) {
                await setStatus('pending', `RTD build: ${state}`);
                lastReportedState = state;
              }
              await sleep(pollSec * 1000);
            }

            await setStatus('failure', `Build did not finish in ${maxWaitMin} min`);
