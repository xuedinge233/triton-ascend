name: LLVM Build

on:
  push:
    paths:
      - cmake/llvm-hash.txt
      - third_party/ascend/llvm_patch/**
      - .github/workflows/llvm-build.yml
      - .github/workflows/llvm-build/**
  pull_request:
    paths:
      - cmake/llvm-hash.txt
      - third_party/ascend/llvm_patch/**
      - .github/workflows/llvm-build.yml
      - .github/workflows/llvm-build/**
  workflow_dispatch:

env:
  SCCACHE_DIR: ${{ github.workspace }}/sccache
  # Remote buildkitd daemon. No Docker daemon runs on the runner; buildctl is a
  # thin TLS client that ships the build to this address (mirrors vllm-omni's
  # .buildkite/pipeline-npu.yaml and vllm-ascend#10931).
  # TODO: confirm this address is reachable from triton-ascend's runners, or set
  # repo variable BUILDKITD_ADDR to override.
  BUILDKITD_ADDR: ${{ vars.BUILDKITD_ADDR || 'tcp://buildkitd-service.buildkitd:1234' }}
  BUILDKIT_VERSION: v0.19.0

permissions:
  contents: read
  id-token: write

jobs:

  build:
    name: Build on ${{ matrix.config.runner }}
    runs-on: ${{ matrix.config.runs_on }}
    # The LLVM compile happens entirely inside the remote buildkitd daemon, so
    # the runner only needs the buildctl client + network access to the daemon
    # (no Docker, no `container:`). These labels can be downsized from cpu-16
    # since nothing compiles locally anymore — they just need to sit inside the
    # cluster that can resolve/reach BUILDKITD_ADDR.
    timeout-minutes: 240

    strategy:
      fail-fast: false
      matrix:
        config:
        - {runner: 'Ubuntu 22.04',       runs_on: 'linux-amd64-cpu-16',   target-os: 'ubuntu',    arch: 'x64',   platform: 'linux/amd64', dockerfile: 'ubuntu.Dockerfile'}
        - {runner: 'Ubuntu 22.04 ARM64', runs_on: 'linux-aarch64-cpu-16', target-os: 'ubuntu',    arch: 'arm64', platform: 'linux/arm64', dockerfile: 'ubuntu.Dockerfile'}
        - {runner: 'CentOS 7',           runs_on: 'linux-amd64-cpu-16',   target-os: 'centos',    arch: 'x64',   platform: 'linux/amd64', dockerfile: 'centos.Dockerfile'}
        - {runner: 'AlmaLinux 8',        runs_on: 'linux-amd64-cpu-16',   target-os: 'almalinux', arch: 'x64',   platform: 'linux/amd64', dockerfile: 'almalinux.Dockerfile'}
        - {runner: 'AlmaLinux 8 ARM64',  runs_on: 'linux-aarch64-cpu-16', target-os: 'almalinux', arch: 'arm64', platform: 'linux/arm64', dockerfile: 'almalinux.Dockerfile'}

    steps:

    - name: Checkout Repo
      uses: actions/checkout@v4
      with:
        path: llvm-build

    - name: Fetch LLVM Commit Hash
      shell: bash
      run: |
        LLVM_COMMIT_HASH="$(cat llvm-build/cmake/llvm-hash.txt)"
        echo "Found LLVM commit hash: ${LLVM_COMMIT_HASH}"
        echo "llvm_commit_hash=${LLVM_COMMIT_HASH}" >> ${GITHUB_ENV}

        SHORT_LLVM_COMMIT_HASH="${LLVM_COMMIT_HASH:0:8}"
        echo "Short LLVM commit hash: ${SHORT_LLVM_COMMIT_HASH}"
        echo "short_llvm_commit_hash=${SHORT_LLVM_COMMIT_HASH}" >> ${GITHUB_ENV}

    - name: Compute Patch Hash
      shell: bash
      run: |
        PATCH_DIR="llvm-build/third_party/ascend/llvm_patch"
        if [ -d "${PATCH_DIR}" ] && find "${PATCH_DIR}" -maxdepth 1 -type f -name '*.patch' -print -quit | grep -q .; then
          PATCH_HASH=$(
            LC_ALL=C find "${PATCH_DIR}" -maxdepth 1 -type f -name '*.patch' -print0 \
              | sort -z \
              | xargs -0 cat \
              | sha256sum \
              | cut -d' ' -f1 \
              | cut -c1-8
          )
        else
          PATCH_HASH="00000000"
        fi
        echo "Patch hash: ${PATCH_HASH}"
        echo "patch_hash=${PATCH_HASH}" >> ${GITHUB_ENV}

        INSTALL_DIR="llvm-${{ env.short_llvm_commit_hash }}-${PATCH_HASH}-${{ matrix.config.target-os }}-${{ matrix.config.arch }}"
        echo "LLVM installation directory name: ${INSTALL_DIR}"
        echo "llvm_install_dir=${INSTALL_DIR}" >> ${GITHUB_ENV}

    - name: Checkout LLVM
      uses: actions/checkout@v4
      with:
        repository: llvm/llvm-project
        path: llvm-project
        ref: ${{ env.llvm_commit_hash }}
        # The monorepo carries clang/flang/libc/libcxx/compiler-rt/... which we
        # never build. blob:none fetches no file contents up front, and the cone
        # sparse-checkout materializes only the subtrees we compile, so git
        # downloads blobs for just these paths. Keep `mlir` here: fad3272.patch
        # only touches mlir/, and any future patch's paths must stay in this set
        # or `git apply` will fail.
        filter: blob:none
        sparse-checkout-cone-mode: true
        sparse-checkout: |
          llvm
          mlir
          lld
          cmake
          third-party

    - name: Apply LLVM patches
      shell: bash
      run: |
        LLVM_SHORT="${{ env.short_llvm_commit_hash }}"
        PATCH_DIR="llvm-build/third_party/ascend/llvm_patch"
        if [ -d "${PATCH_DIR}" ]; then
          cd llvm-project
          for patchfile in ${GITHUB_WORKSPACE}/${PATCH_DIR}/*.patch; do
            if [ -f "$patchfile" ]; then
              echo "Applying $patchfile..."
              git apply "$patchfile"
            fi
          done
          cd ..
        fi

    - name: Enable Cache
      uses: actions/cache@v4
      with:
        path: ${{ env.SCCACHE_DIR }}
        key: ${{ matrix.config.target-os }}-${{ matrix.config.arch }}-${{ env.short_llvm_commit_hash }}-${{ env.patch_hash }}
        restore-keys: ${{ matrix.config.target-os }}-${{ matrix.config.arch }}-

    - name: Prepare build context
      shell: bash
      run: |
        # The Dockerfiles do `COPY sccache /sccache`, so the dir must exist in
        # the context even on a cache miss.
        mkdir -p "${{ env.SCCACHE_DIR }}"
        # Trim what `buildctl --local context=.` uploads to the daemon. The
        # context only needs llvm-project/ (source) and sccache/; the Dockerfile
        # is sent separately via --local dockerfile. .git dirs and the triton
        # checkout are dead weight over the wire.
        printf '%s\n' '**/.git' 'llvm-build' 'out' '*.tar.gz' > .dockerignore

    - name: Install buildctl
      shell: bash
      env:
        # Override to an internal mirror if github.com is unreliable from the
        # runner's network (the cn-southwest-2 cluster often is — this is the
        # `curl (56)` failure). Should point at a buildkit-*.linux-<arch>.tar.gz.
        BUILDKIT_DOWNLOAD_URL: ${{ vars.BUILDKIT_DOWNLOAD_URL }}
      run: |
        set -euo pipefail
        if command -v buildctl >/dev/null 2>&1; then
          echo "buildctl already installed: $(buildctl --version)"
          exit 0
        fi
        ARCH=$(uname -m | sed 's/x86_64/amd64/; s/aarch64/arm64/')
        URL="${BUILDKIT_DOWNLOAD_URL:-https://github.com/moby/buildkit/releases/download/${BUILDKIT_VERSION}/buildkit-${BUILDKIT_VERSION}.linux-${ARCH}.tar.gz}"
        echo "Downloading buildctl from: ${URL}"
        # Download to a file (never pipe into tar) so a truncated transfer fails
        # loudly. -f errors on HTTP failures; --retry/--retry-all-errors recovers
        # transient network drops like the curl(56) recv error.
        for i in 1 2 3 4 5; do
          if curl -fSL --connect-timeout 30 --retry 5 --retry-all-errors \
               --retry-delay 5 -o /tmp/buildkit.tar.gz "${URL}"; then
            break
          fi
          echo "buildctl download attempt ${i} failed; retrying..." >&2
          [ "${i}" -eq 5 ] && { echo "giving up downloading buildctl" >&2; exit 1; }
          sleep $(( i * 5 ))
        done
        gzip -t /tmp/buildkit.tar.gz   # integrity gate before extracting
        # /usr/local/bin isn't writable for the non-root runner user; install to
        # a writable dir and expose it to later steps via $GITHUB_PATH.
        INSTALL_DIR="${RUNNER_TEMP}/bin"
        mkdir -p "${INSTALL_DIR}"
        tar -xzf /tmp/buildkit.tar.gz -C "${INSTALL_DIR}" --strip-components=1 bin/buildctl
        rm -f /tmp/buildkit.tar.gz
        echo "${INSTALL_DIR}" >> "$GITHUB_PATH"
        "${INSTALL_DIR}/buildctl" --version

    - name: Setup buildkitd TLS certs
      shell: bash
      # TODO: add these repo secrets (base64-encoded PEMs) as in
      # vllm-ascend#10931 / vllm-omni's Vault-injected ca/cert/key.pem.
      run: |
        CERT_DIR="${RUNNER_TEMP}/buildkitd-certs"
        mkdir -p "${CERT_DIR}"
        echo "${{ secrets.BUILDKITD_CA }}"   | base64 -d > "${CERT_DIR}/ca.pem"
        echo "${{ secrets.BUILDKITD_CERT }}" | base64 -d > "${CERT_DIR}/cert.pem"
        echo "${{ secrets.BUILDKITD_KEY }}"  | base64 -d > "${CERT_DIR}/key.pem"
        echo "CERT_DIR=${CERT_DIR}" >> $GITHUB_ENV

    - name: Build LLVM via buildkitd and export artifacts
      shell: bash
      # Replaces the old `docker build` + `docker create` + `docker cp` dance.
      # buildctl builds the per-OS Dockerfile on the remote daemon and exports
      # the `export` stage (install + warmed sccache) to ./out — no local Docker.
      run: |
        rm -rf out
        buildctl \
          --addr="${BUILDKITD_ADDR}" \
          --tlscacert="${CERT_DIR}/ca.pem" \
          --tlscert="${CERT_DIR}/cert.pem" \
          --tlskey="${CERT_DIR}/key.pem" \
          build \
          --frontend dockerfile.v0 \
          --opt platform=${{ matrix.config.platform }} \
          --opt build-arg:llvm_dir=llvm-project \
          --opt target=export \
          --local context=. \
          --local dockerfile=llvm-build/.github/workflows/llvm-build \
          --opt filename=${{ matrix.config.dockerfile }} \
          --output type=local,dest=out \
          --progress=plain

    - name: Package artifacts and refresh sccache
      shell: bash
      run: |
        # Export stage placed /install and /sccache at out/install, out/sccache.
        rm -rf "${{ env.llvm_install_dir }}"
        mv out/install "${{ env.llvm_install_dir }}"
        tar czf "${{ env.llvm_install_dir }}.tar.gz" "${{ env.llvm_install_dir }}"
        # Persist the warmed sccache to the path actions/cache saves on post.
        rm -rf "${{ env.SCCACHE_DIR }}"
        mv out/sccache "${{ env.SCCACHE_DIR }}"

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: llvm-${{ matrix.config.target-os }}-${{ matrix.config.arch }}
        path: |
          ${{ github.workspace }}/llvm-*-${{ matrix.config.target-os }}-${{ matrix.config.arch }}.tar.gz

    - name: Setup obsutil and upload to OBS
      if: github.event_name == 'push' && github.repository == 'triton-lang/triton-ascend'
      shell: bash
      env:
        AK: ${{ secrets.OBS_AK }}
        SK: ${{ secrets.OBS_SK }}
        ARCH: ${{ matrix.config.arch == 'x64' && 'amd64' || 'arm64' }}
      run: |
        set -eu
        if [ -z "${AK}" ] || [ -z "${SK}" ]; then
          echo "OBS credentials are empty."
          exit 1
        fi
        curl -fL "https://obs-community.obs.cn-north-1.myhuaweicloud.com/obsutil/current/obsutil_linux_${ARCH}.tar.gz" -o obsutil.tar.gz
        gzip -t obsutil.tar.gz || { echo "obsutil.tar.gz is not a valid gzip"; exit 1; }
        tar xzf obsutil.tar.gz
        rm -f obsutil.tar.gz
        mv obsutil_linux_* obsutil

        obsutil/obsutil config -i="${AK}" -k="${SK}" -e=https://obs.cn-southwest-2.myhuaweicloud.com
        obsutil/obsutil cp -u "${{ env.llvm_install_dir }}.tar.gz" obs://triton-ascend-artifacts/llvm-builds/
