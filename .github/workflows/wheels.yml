name: Wheels

on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/wheels.yml
  schedule:
    - cron: "0 8 * * *"

concurrency:
  group: wheels-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:

  Build-Wheels:
    timeout-minutes: 360
    runs-on: ${{ matrix.config.runs_on }}
    # Self-hosted heavy-build runners (x86_64 -> linux-amd64-cpu-16,
    # aarch64 -> linux-aarch64-cpu-16). The build runs directly inside the
    # manylinux image (cibuildwheel's own base), so there is NO Docker daemon on
    # the runner: we drive the same build + auditwheel steps cibuildwheel used to
    # orchestrate. The image ships every CPython under /opt/python/cpXXX-cpXXX.
    container:
      # quay.io is unreachable from the cn-southwest-2 cluster. Mirror the pypa
      # manylinux images into SWR (the registry every other workflow already
      # pulls from) and set repo variable MANYLINUX_IMAGE_PREFIX to that
      # namespace, e.g.
      #   MANYLINUX_IMAGE_PREFIX=swr.cn-southwest-2.myhuaweicloud.com/modelfoundry
      # Mirror once from a host that can reach both registries:
      #   skopeo copy docker://quay.io/pypa/manylinux_2_28_x86_64:latest \
      #     docker://${MANYLINUX_IMAGE_PREFIX}/manylinux_2_28_x86_64:latest
      #   (repeat for manylinux_2_28_aarch64)
      image: ${{ vars.MANYLINUX_IMAGE_PREFIX || 'quay.io/pypa' }}/manylinux_2_28_${{ matrix.config.arch }}:latest

    strategy:
      fail-fast: false
      matrix:
        config:
        - {runs_on: 'linux-amd64-cpu-16', arch: 'x86_64'}
        - {runs_on: 'linux-aarch64-cpu-16', arch: 'aarch64'}
        python: ["cp310", "cp311", "cp312", "cp313"]
        branch:
        - {ref: 'main', tag: 'main', local: 'dev', path: '.'}
        - {ref: 'release/3.2.2', tag: 'release-3.2.2', local: 'release', path: 'python'}

    permissions:
      id-token: write
      contents: read

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch.ref }}
          submodules: "true"

      - name: Add git safe directory
        # The container runs as root while the checkout is owned by the runner
        # user; without this git refuses to operate ("dubious ownership").
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Cache build dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/${{ matrix.branch.path }}/.triton-cache
            ${{ github.workspace }}/${{ matrix.branch.path }}/.ccache
          key: wheels-${{ matrix.config.arch }}-${{ matrix.python }}-${{ hashFiles('cmake/llvm-hash.txt', 'cmake/json-version.txt', 'cmake/nvidia-toolchain-version.json', 'third_party/ascend/llvm_patch/*.patch') }}
          restore-keys: |
            wheels-${{ matrix.config.arch }}-${{ matrix.python }}-

      - name: Build wheel
        shell: bash
        run: |
          set -euo pipefail

          # The manylinux image ships GCC but not clang/lld/ccache. (Same as the
          # old CIBW_BEFORE_ALL step.)
          dnf install -y clang lld ccache

          # Select the target CPython bundled in the manylinux image, e.g.
          # cp311 -> /opt/python/cp311-cp311/bin/python.
          PY="/opt/python/${{ matrix.python }}-${{ matrix.python }}/bin/python"
          "${PY}" --version

          # Cap parallelism: MAX_JOBS = nproc/3 because the build OOMs at the
          # default (2 * nproc) on these nodes.
          NUM_PROCS=$(( $(nproc) / 3 ))
          if [ "$NUM_PROCS" -lt 1 ]; then NUM_PROCS=1; fi

          # Cache dirs (persisted by actions/cache). Previously cibuildwheel
          # bind-mounted these to /project; now the workspace IS the build dir.
          CACHE_BASE="${GITHUB_WORKSPACE}/${{ matrix.branch.path }}"
          mkdir -p "${CACHE_BASE}/.triton-cache" "${CACHE_BASE}/.ccache"

          # Wheel version: <base>+<local>YYYYMMDD (UTC, computed once).
          # IS_MANYLINUX=TRUE suppresses setup.py's +git<hash> append.
          BUILD_DATE=$(date -u +%Y%m%d)

          export MAX_JOBS="${NUM_PROCS}"
          export TRITON_BUILD_WITH_CLANG_LLD=true
          export TRITON_BUILD_PROTON=OFF
          export TRITON_WHEEL_NAME=triton-ascend
          export TRITON_APPEND_CMAKE_ARGS="-DTRITON_BUILD_UT=OFF"
          export TRITON_WHEEL_VERSION_SUFFIX="${TRITON_WHEEL_VERSION_SUFFIX:-}+${{ matrix.branch.local }}${BUILD_DATE}"
          export IS_MANYLINUX=TRUE
          export TRITON_HOME="${CACHE_BASE}/.triton-cache"
          export TRITON_BUILD_WITH_CCACHE=true
          export CCACHE_DIR="${CACHE_BASE}/.ccache"
          export CCACHE_COMPRESS=true

          # Build the (non-portable) wheel via PEP 517, then make it portable.
          rm -rf wheelhouse_raw wheelhouse
          "${PY}" -m pip wheel "${{ matrix.branch.path }}" --no-deps -w wheelhouse_raw

          # auditwheel (preinstalled in manylinux) bundles external .so files and
          # stamps the manylinux_2_28 tag — the portability cibuildwheel gave us.
          for whl in wheelhouse_raw/*.whl; do
            auditwheel repair "${whl}" --plat "manylinux_2_28_${{ matrix.config.arch }}" -w wheelhouse
          done
          ls -l wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-manylinux_2_28_${{ matrix.config.arch }}-${{ matrix.python }}-${{ matrix.branch.tag }}-wheels-upload
          path: ./wheelhouse/*.whl

      - name: Setup obsutil and upload to OBS
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          AK: ${{ secrets.NIGHTLY_OBS_AK }}
          SK: ${{ secrets.NIGHTLY_OBS_SK }}
          ARCH: ${{ matrix.config.arch == 'x86_64' && 'amd64' || 'arm64' }}
        run: |
          set -eu
          if [ -z "${AK}" ] || [ -z "${SK}" ]; then
            echo "OBS credentials are empty."
            exit 1
          fi
          curl -fL "https://obs-community.obs.cn-north-1.myhuaweicloud.com/obsutil/current/obsutil_linux_${ARCH}.tar.gz" -o obsutil.tar.gz
          gzip -t obsutil.tar.gz || { echo "obsutil.tar.gz is not a valid gzip"; exit 1; }
          tar xzf obsutil.tar.gz
          rm -f obsutil.tar.gz
          mv obsutil_linux_* obsutil

          obsutil/obsutil config -i="${AK}" -k="${SK}" -e=https://obs.cn-north-4.myhuaweicloud.com
          OBS_DIR="obs://ascend-artifcat-packages/pypi/packages/ascend/repos/pypi/nightly/triton-ascend/"
          obsutil/obsutil cp -u wheelhouse/*.whl "${OBS_DIR}"

          # Regenerate index.html from every .whl currently in the directory
          # (non-recursive, short format), keeping only the basenames.
          obsutil/obsutil ls "${OBS_DIR}" -d -s -limit=0 \
            | grep -oE '[^/]+\.whl$' \
            | sort -u > files.txt
          while IFS= read -r f; do
            printf "<a href='%s'>%s</a><br />\n" "$f" "$f"
          done < files.txt > index.html
          obsutil/obsutil cp index.html "${OBS_DIR}"
