name: Wheels
on:
  workflow_dispatch:
  workflow_call:
    inputs:
      ci_only:
        description: |
          When true, only build wheels needed by integration tests (aarch64,
          cp310/cp311), skip OBS upload, and emit a separately-named artifact
          for the test job to consume.
        type: boolean
        default: false
  schedule:
    - cron: "0 8 * * *"

jobs:

  Matrix-Prep:
    # Emit the build matrix; in ci_only mode it shrinks to the only combos the
    # NPU integration tests consume (aarch64 × cp310/cp311) so PRs don't burn
    # all 8 build slots.
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        shell: bash
        env:
          CI_ONLY: ${{ inputs.ci_only }}
        run: |
          if [ "$CI_ONLY" = "true" ]; then
            cat <<'EOF' >> "$GITHUB_OUTPUT"
          matrix={"config":[{"runs_on":"ubuntu-22.04-arm","arch":"aarch64"}],"python":["cp310","cp311"]}
          EOF
          else
            cat <<'EOF' >> "$GITHUB_OUTPUT"
          matrix={"config":[{"runs_on":"ubuntu-22.04","arch":"x86_64"},{"runs_on":"ubuntu-22.04-arm","arch":"aarch64"}],"python":["cp310","cp311","cp312","cp313"]}
          EOF
          fi

  Build-Wheels:
    needs: Matrix-Prep
    timeout-minutes: 360
    runs-on: ${{ matrix.config.runs_on }}

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.Matrix-Prep.outputs.matrix) }}

    permissions:
      id-token: write
      contents: read

    steps:

      - name: Prune stale docker containers
        run: |
          # If cibuildwheel crashes (or, say, is OOM-killed), it leaves behind a
          # docker container.  Eventually these consume all the disk space on
          # this machine.
          docker container prune -f

      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build wheels
        run: |
          python --version
          # Make sure cibuildwheel is updated to latest, this will enable latest python builds
          python3 -m pip install cibuildwheel --upgrade --user
          # Pass MAX_JOBS=4 because, at time of writing, the VM "only" has 32GB
          # of RAM and OOMs while building if we give it the default number of
          # workers (2 * NUM_CPUs).
          NUM_PROCS=$(( $(nproc) / 3 ))
          if [ "$NUM_PROCS" -lt 1 ]; then NUM_PROCS=1; fi

          # required to build Python 3.14 with cibuildwheel 2.23.3
          # todo: Need to update system Python to 3.11 and update cibuildwheel to latest

          export CIBW_ENVIRONMENT="MAX_JOBS=${NUM_PROCS} \
            TRITON_BUILD_WITH_CLANG_LLD=true \
            TRITON_BUILD_PROTON=OFF \
            TRITON_WHEEL_NAME=triton-ascend \
            TRITON_APPEND_CMAKE_ARGS='-DTRITON_BUILD_UT=OFF' \
            TRITON_WHEEL_VERSION_SUFFIX=${TRITON_WHEEL_VERSION_SUFFIX:-rc3}"

          # many_linux_2_28 image comes with GCC 12.2.1, but not clang.
          # With this install, it gets clang 16.0.6.
          export CIBW_BEFORE_ALL="dnf install clang lld ccache -y"

          if [[ ${{ matrix.config.arch }} == 'x86_64' ]]; then
            export CIBW_MANYLINUX_X86_64_IMAGE="quay.io/pypa/manylinux_2_28_${{ matrix.config.arch }}:latest"
          else
            export CIBW_MANYLINUX_AARCH64_IMAGE="quay.io/pypa/manylinux_2_28_${{ matrix.config.arch }}:latest"
          fi

          export CIBW_BUILD="${{ matrix.python }}-manylinux_${{ matrix.config.arch }}"

          python3 -m cibuildwheel . --output-dir wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-manylinux_2_28_${{ matrix.config.arch }}-wheels-upload
          path: ./wheelhouse/*.whl

      - name: Upload wheels to OBS
        shell: bash
        env:
          AK: ${{ secrets.OBS_AK }}
          SK: ${{ secrets.OBS_SK }}
          CI_ONLY: ${{ inputs.ci_only }}
        run: |
          if [ -z "${AK}" ] || [ -z "${SK}" ]; then
            echo "Please set OBS_AK and OBS_SK secrets before uploading."
            exit 1
          fi

          OBSUTIL_URL="https://obs-community.obs.cn-north-1.myhuaweicloud.com/obsutil/current/obsutil_linux_${{ matrix.config.arch == 'x86_64' && 'amd64' || 'arm64' }}.tar.gz"
          curl -fL "$OBSUTIL_URL" -o obsutil.tar.gz

          file obsutil.tar.gz | grep -q gzip || {
            echo "obsutil.tar.gz is not a gzip file"
            exit 1
          }

          tar xzf obsutil.tar.gz
          rm -f obsutil.tar.gz
          mv obsutil* obsutil

          obsutil/obsutil config -i="${AK}" -k="${SK}" -e=https://obs.cn-southwest-2.myhuaweicloud.com

          if [ "$CI_ONLY" = "true" ]; then
            # Per-run path; integration-tests-ascend reads from the same prefix.
            # Add an OBS lifecycle policy on `triton-ascend-ci/` to auto-expire.
            DEST="obs://triton-ascend-artifacts/triton-ascend-pr/${{ github.sha }}/${{ matrix.python }}-${{ matrix.config.arch }}/"
            # Drop a manifest so consumers can fetch the wheel anonymously
            # without needing OBS list/credentials.
            basename wheelhouse/*.whl > wheelhouse/wheel-name.txt
            obsutil/obsutil cp -u wheelhouse/wheel-name.txt "$DEST"
          else
            DEST="obs://triton-ascend-artifacts/triton-ascend/"
          fi
          obsutil/obsutil cp -u wheelhouse/*.whl "$DEST"
