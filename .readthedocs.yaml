# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details
#
# Single config drives both language projects. Each RTD project sets
# DOCS_LANG (in Admin -> Environment Variables) to "zh" or "en"; defaults
# to "zh" so the existing main project keeps working without extra setup.

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  commands:
    - pip install -r "docs/${DOCS_LANG:-zh}/requirement.txt"
    - python -m sphinx -b html "docs/${DOCS_LANG:-zh}" "$READTHEDOCS_OUTPUT/html"
